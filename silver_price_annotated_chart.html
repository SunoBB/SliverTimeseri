<h2 class="sr-only">Biểu đồ giá bạc USD 2011–2026 với sự kiện kinh tế lớn, có thể lọc theo danh mục</h2>

<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:16px 0;font-family:var(--font-sans)}
.top-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filter-btn{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.chart-area{position:relative;width:100%;height:320px;margin-bottom:8px}
.tooltip{position:absolute;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--color-text-primary);pointer-events:none;opacity:0;transition:opacity .1s;z-index:10;min-width:180px}
.tt-price{font-size:18px;font-weight:500;margin:2px 0 4px}
.tt-event{font-size:11px;padding:4px 8px;border-radius:4px;margin-top:6px;line-height:1.4}
.ev-list{margin-top:12px;display:grid;grid-template-columns:1fr;gap:6px}
.ev-card{background:var(--color-background-secondary);border-radius:8px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;border:0.5px solid transparent;transition:border-color .15s}
.ev-card:hover{border-color:var(--color-border-secondary)}
.ev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ev-year{font-size:11px;font-weight:500;color:var(--color-text-secondary);min-width:32px}
.ev-title{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.ev-desc{font-size:11px;color:var(--color-text-secondary);margin-top:2px;line-height:1.4}
.ev-change{font-size:11px;font-weight:500;margin-top:3px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;font-size:11px;color:var(--color-text-secondary)}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.section-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;margin-top:4px}
</style>

<div class="wrap">
<div class="top-bar">
  <span style="font-size:12px;color:var(--color-text-secondary)">Lọc sự kiện:</span>
  <button class="filter-btn active" data-cat="all">Tất cả</button>
  <button class="filter-btn" data-cat="crisis">Khủng hoảng</button>
  <button class="filter-btn" data-cat="fed">Chính sách Fed</button>
  <button class="filter-btn" data-cat="geopolitical">Địa chính trị</button>
  <button class="filter-btn" data-cat="commodity">Hàng hóa</button>
</div>

<div class="legend">
  <span class="leg-item"><span class="leg-dot" style="background:#E24B4A"></span>Khủng hoảng</span>
  <span class="leg-item"><span class="leg-dot" style="background:#378ADD"></span>Chính sách Fed</span>
  <span class="leg-item"><span class="leg-dot" style="background:#BA7517"></span>Địa chính trị</span>
  <span class="leg-item"><span class="leg-dot" style="background:#1D9E75"></span>Hàng hóa</span>
</div>

<div class="chart-area">
  <canvas id="sc" role="img" aria-label="Biểu đồ giá bạc USD từ 2011 đến 2026 với các sự kiện kinh tế được đánh dấu">Giá bạc USD 2011-2026 với sự kiện kinh tế.</canvas>
  <div class="tooltip" id="tt">
    <div style="font-size:11px;color:var(--color-text-secondary)" id="tt-date"></div>
    <div class="tt-price" id="tt-price"></div>
    <div id="tt-ev"></div>
  </div>
</div>

<p class="section-label">Danh mục sự kiện gây sốc giá bạc</p>
<div class="ev-list" id="ev-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CAT_COLOR = {
  crisis:      {hex:'#E24B4A', bg:'#FCEBEB', txt:'#A32D2D'},
  fed:         {hex:'#378ADD', bg:'#E6F1FB', txt:'#185FA5'},
  geopolitical:{hex:'#BA7517', bg:'#FAEEDA', txt:'#633806'},
  commodity:   {hex:'#1D9E75', bg:'#E1F5EE', txt:'#085041'}
};

const EVENTS = [
  {year:2011, month:4, label:'Bạc đỉnh lịch sử $49', desc:'Sóng đầu cơ và lo ngại lạm phát sau QE2 đẩy giá lên đỉnh 49 USD/oz', cat:'commodity', change:'+180% từ 2009'},
  {year:2011, month:9, label:'Flash crash tháng 9/2011', desc:'Giá giảm 30% trong 2 tuần do tháo chạy khỏi tài sản rủi ro, margin call', cat:'crisis', change:'-30% / 2 tuần'},
  {year:2013, month:4, label:'Sụp đổ giá vàng/bạc 2013', desc:'Fed úp mở tapering, bán tháo đồng loạt, bạc mất 17% trong 2 ngày', cat:'fed', change:'-17% / 2 ngày'},
  {year:2015, month:7, label:'Trung Quốc phá giá NDT', desc:'Chiến tranh tiền tệ, đô-la mạnh gây áp lực lên kim loại quý', cat:'geopolitical', change:'-15% Q3/2015'},
  {year:2016, month:6, label:'Brexit', desc:'Anh bỏ phiếu rời EU, bạc tăng mạnh do nhu cầu tài sản an toàn', cat:'geopolitical', change:'+10% tuần đầu'},
  {year:2018, month:10, label:'Chiến tranh thương mại Mỹ-Trung', desc:'Thuế quan leo thang, đô-la mạnh, bạc giảm xuống đáy 14 USD', cat:'geopolitical', change:'-20% cả năm'},
  {year:2020, month:3, label:'COVID-19 panic sell', desc:'Bán tháo toàn thị trường để lấy thanh khoản, bạc rơi về 12 USD', cat:'crisis', change:'-35% / tháng'},
  {year:2020, month:8, label:'Đỉnh hậu COVID $29', desc:'QE khổng lồ + kỳ vọng lạm phát + sóng Reddit WallStreetBets', cat:'fed', change:'+140% từ đáy'},
  {year:2021, month:1, label:'Short squeeze WSB', desc:'Cộng đồng Reddit cố squeeze bạc, giá bật lên rồi nhanh chóng hạ nhiệt', cat:'commodity', change:'+13% rồi giảm'},
  {year:2022, month:3, label:'Nga xâm lược Ukraine', desc:'Bạc tăng ngắn hạn do lo ngại địa chính trị, sau đó Fed tăng lãi suất đè xuống', cat:'geopolitical', change:'+8% rồi -25%'},
  {year:2022, month:6, label:'Fed tăng lãi suất mạnh nhất 40 năm', desc:'75bp mỗi lần họp liên tiếp, đô-la DXY lên đỉnh, bạc về 17 USD', cat:'fed', change:'-30% cả năm'},
  {year:2023, month:3, label:'Khủng hoảng SVB & ngân hàng khu vực', desc:'Lo ngại hệ thống ngân hàng, dòng tiền chạy vào kim loại quý', cat:'crisis', change:'+10% tháng 3'},
  {year:2024, month:10, label:'Bạc vượt $33 — đỉnh 12 năm', desc:'Nhu cầu pin mặt trời tăng đột biến + Fed bắt đầu cắt lãi suất', cat:'commodity', change:'+40% cả năm'},
  {year:2025, month:3, label:'Tariff Trump — sốc cung', desc:'Thuế 25% lên hàng hóa Canada/Mexico gây gián đoạn chuỗi cung bạc công nghiệp', cat:'geopolitical', change:'+15% Q1/2025'},
  {year:2026, month:3, label:'Bạc $68 — đỉnh mọi thời đại', desc:'Nhu cầu pin xe điện và tấm pin năng lượng mặt trời vượt cung, bạc phá đỉnh lịch sử', cat:'commodity', change:'+100% từ 2024'},
];

const PRICE_DATA = [
  {y:2011,m:6,p:36.8},{y:2011,m:9,p:31.1},{y:2012,m:2,p:33.2},{y:2012,m:9,p:34.7},
  {y:2013,m:1,p:30.5},{y:2013,m:6,p:19.8},{y:2013,m:12,p:19.5},{y:2014,m:6,p:20.1},
  {y:2014,m:12,p:15.7},{y:2015,m:6,p:15.8},{y:2015,m:12,p:13.8},{y:2016,m:6,p:17.8},
  {y:2016,m:12,p:15.9},{y:2017,m:6,p:16.6},{y:2017,m:12,p:16.0},{y:2018,m:6,p:16.1},
  {y:2018,m:12,p:15.6},{y:2019,m:6,p:15.3},{y:2019,m:12,p:17.8},{y:2020,m:3,p:14.0},
  {y:2020,m:8,p:28.9},{y:2020,m:12,p:26.4},{y:2021,m:1,p:27.3},{y:2021,m:6,p:27.7},
  {y:2021,m:12,p:23.2},{y:2022,m:3,p:25.8},{y:2022,m:6,p:21.5},{y:2022,m:9,p:18.9},
  {y:2022,m:12,p:23.9},{y:2023,m:3,p:23.2},{y:2023,m:6,p:23.5},{y:2023,m:12,p:24.6},
  {y:2024,m:3,p:24.7},{y:2024,m:6,p:29.3},{y:2024,m:10,p:33.1},{y:2024,m:12,p:30.0},
  {y:2025,m:3,p:32.8},{y:2025,m:6,p:34.5},{y:2025,m:9,p:38.0},{y:2026,m:3,p:68.0},
];

const labels = PRICE_DATA.map(d => `${d.y}/${String(d.m).padStart(2,'0')}`);
const prices = PRICE_DATA.map(d => d.p);

function evToDataIdx(ev) {
  let best = -1, bestDist = Infinity;
  PRICE_DATA.forEach((d,i)=>{
    const dist = Math.abs((d.y - ev.year)*12 + (d.m - ev.month));
    if(dist < bestDist){bestDist=dist;best=i;}
  });
  return best;
}

let activeFilter = 'all';
let myChart;

function buildAnnotations(filter) {
  return EVENTS
    .filter(ev => filter === 'all' || ev.cat === filter)
    .map(ev => {
      const idx = evToDataIdx(ev);
      const c = CAT_COLOR[ev.cat];
      return {
        type:'point',
        xValue: idx,
        yValue: prices[idx],
        backgroundColor: c.hex,
        borderColor: '#fff',
        borderWidth: 2,
        radius: 7,
        hoverRadius: 10,
        _ev: ev,
        _idx: idx,
      };
    });
}

function renderEventList(filter) {
  const list = document.getElementById('ev-list');
  const filtered = EVENTS.filter(ev => filter === 'all' || ev.cat === filter);
  list.innerHTML = filtered.map((ev,i) => {
    const c = CAT_COLOR[ev.cat];
    return `<div class="ev-card" data-i="${i}" onclick="highlightEvent(${EVENTS.indexOf(ev)})">
      <span class="ev-dot" style="background:${c.hex}"></span>
      <div>
        <div style="display:flex;gap:8px;align-items:baseline">
          <span class="ev-year">${ev.year}</span>
          <span class="ev-title">${ev.label}</span>
        </div>
        <div class="ev-desc">${ev.desc}</div>
        <div class="ev-change" style="color:${c.txt}">${ev.change}</div>
      </div>
    </div>`;
  }).join('');
}

function highlightEvent(evIdx) {
  const ev = EVENTS[evIdx];
  const idx = evToDataIdx(ev);
  const c = CAT_COLOR[ev.cat];
  const tt = document.getElementById('tt');
  const meta = myChart.getDatasetMeta(0);
  if(!meta.data[idx]) return;
  const el = meta.data[idx];
  const rect = myChart.canvas.getBoundingClientRect();
  const canvasRect = myChart.canvas.parentElement.getBoundingClientRect();
  const x = el.x;
  const y = el.y;
  document.getElementById('tt-date').textContent = `${ev.year}/${String(ev.month).padStart(2,'0')}`;
  document.getElementById('tt-price').textContent = `$${prices[idx].toFixed(2)}/oz`;
  document.getElementById('tt-ev').innerHTML = `<div class="tt-event" style="background:${c.bg};color:${c.txt}">${ev.label}<br><span style="font-weight:400">${ev.change}</span></div>`;
  const left = Math.min(x + 10, myChart.canvas.width - 200);
  tt.style.left = left + 'px';
  tt.style.top = Math.max(y - 80, 0) + 'px';
  tt.style.opacity = '1';
  setTimeout(()=>{ tt.style.opacity='0'; }, 3500);
}

function initChart() {
  const ctx = document.getElementById('sc').getContext('2d');
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#888780' : '#888780';

  const pointColors = labels.map((_,i) => {
    const evAtIdx = EVENTS.filter(ev => {
      const idx = evToDataIdx(ev);
      return idx === i && (activeFilter==='all'||ev.cat===activeFilter);
    });
    return evAtIdx.length > 0 ? CAT_COLOR[evAtIdx[0].cat].hex : '#378ADD';
  });
  const pointRadius = labels.map((_,i) => {
    const evAtIdx = EVENTS.filter(ev => {
      const idx = evToDataIdx(ev);
      return idx === i && (activeFilter==='all'||ev.cat===activeFilter);
    });
    return evAtIdx.length > 0 ? 7 : 2;
  });
  const pointBorderW = labels.map((_,i) => {
    const evAtIdx = EVENTS.filter(ev => {
      const idx = evToDataIdx(ev);
      return idx === i && (activeFilter==='all'||ev.cat===activeFilter);
    });
    return evAtIdx.length > 0 ? 2 : 0;
  });

  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: prices,
        borderColor: '#378ADD',
        borderWidth: 1.5,
        fill: false,
        tension: 0.3,
        pointBackgroundColor: pointColors,
        pointBorderColor: '#fff',
        pointBorderWidth: pointBorderW,
        pointRadius: pointRadius,
        pointHoverRadius: 9,
        segment: {
          borderDash: ctx2 => ctx2.p0DataIndex >= 35 ? [4,3] : undefined,
        }
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display:false },
        tooltip: {
          callbacks: {
            title: items => {
              const raw = items[0].label;
              return raw;
            },
            label: items => `$${items.parsed.y.toFixed(2)}/oz`,
            afterLabel: items => {
              const idx = items.dataIndex;
              const evHere = EVENTS.filter(ev => evToDataIdx(ev) === idx && (activeFilter==='all'||ev.cat===activeFilter));
              return evHere.length > 0 ? '  ' + evHere[0].label : '';
            }
          },
          backgroundColor: isDark ? '#2C2C2A' : '#fff',
          titleColor: textColor,
          bodyColor: isDark ? '#c2c0b6' : '#2C2C2A',
          borderColor: isDark ? 'rgba(255,255,255,.12)' : 'rgba(0,0,0,.1)',
          borderWidth: 0.5,
          padding: 10,
          cornerRadius: 8,
        }
      },
      scales: {
        x: {
          ticks: { color: textColor, font:{size:10}, maxTicksLimit:10, maxRotation:0 },
          grid: { color: gridColor }
        },
        y: {
          ticks: {
            color: textColor,
            font:{size:10},
            callback: v => '$' + v
          },
          grid: { color: gridColor },
          title: { display:true, text:'USD / oz', color: textColor, font:{size:11} }
        }
      }
    }
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.cat;
    renderEventList(activeFilter);
    if(myChart){ myChart.destroy(); }
    initChart();
  });
});

initChart();
renderEventList('all');
</script>
